<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeChat AI Workspace</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
    background:
    linear-gradient(
        135deg,
        #eef2f7 0%,
        #e8edf3 50%,
        #dde5ee 100%
    );

    min-height:100vh;
}

.glass{
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.4);

    box-shadow:
    0 8px 32px rgba(15,23,42,0.08);
}

textarea{
    resize:none;
}

.search-input{
    background:rgba(255,255,255,0.65);
}

.message-card{
    transition:all .2s ease;
}

.message-card:hover{
    transform:translateY(-2px);
}

.soft-btn{
    transition:all .2s ease;
}

.soft-btn:hover{
    transform:translateY(-1px);
}

</style>
</head>

<body class="text-slate-800">

<div class="max-w-7xl mx-auto p-4 md:p-8">

    <!-- HEADER -->
    <div class="mb-8">

        <div class="flex items-center gap-4">

            <div class="w-14 h-14 rounded-3xl
            bg-gradient-to-br from-blue-500 to-cyan-400
            text-white flex items-center justify-center
            text-2xl shadow-lg">

                <i class="fa-brands fa-weixin"></i>

            </div>

            <div>
                <h1 class="text-3xl font-bold tracking-tight">
                    WeChat AI Workspace
                </h1>

                <p class="text-slate-500 mt-1">
                    AI 微信工作訊息管理系統
                </p>
            </div>

        </div>

    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- LEFT -->
        <div class="space-y-6">

            <!-- SEARCH -->
            <div class="glass rounded-3xl p-5">

                <div class="flex items-center gap-2 mb-4">

                    <i class="fa-solid fa-magnifying-glass text-blue-500"></i>

                    <h2 class="font-semibold">
                        AI 搜尋
                    </h2>

                </div>

                <input
                    type="text"
                    placeholder="搜尋 DG6ZM / 四向光 / 交期..."
                    class="search-input w-full rounded-2xl
                    px-4 py-3 outline-none"
                >

                <button class="soft-btn mt-4 w-full
                rounded-2xl py-3
                bg-gradient-to-r from-blue-500 to-cyan-500
                text-white font-semibold">

                    搜尋訊息

                </button>

            </div>

            <!-- TAG -->
            <div class="glass rounded-3xl p-5">

                <div class="flex items-center gap-2 mb-4">

                    <i class="fa-solid fa-tags text-orange-400"></i>

                    <h2 class="font-semibold">
                        常用主題
                    </h2>

                </div>

                <div class="flex flex-wrap gap-2">

                    <div class="px-3 py-2 rounded-xl
                    bg-blue-100 text-blue-700 text-sm">
                        DG6ZM
                    </div>

                    <div class="px-3 py-2 rounded-xl
                    bg-cyan-100 text-cyan-700 text-sm">
                        四向光
                    </div>

                    <div class="px-3 py-2 rounded-xl
                    bg-orange-100 text-orange-700 text-sm">
                        CBD
                    </div>

                    <div class="px-3 py-2 rounded-xl
                    bg-emerald-100 text-emerald-700 text-sm">
                        交期
                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="lg:col-span-2 space-y-6">

            <!-- INPUT -->
            <div class="glass rounded-3xl p-6">

                <div class="flex items-center gap-2 mb-4">

                    <i class="fa-solid fa-comment-dots text-blue-500"></i>

                    <h2 class="font-semibold">
                        貼上微信內容
                    </h2>

                </div>

                <textarea
                    rows="10"
                    placeholder="請直接貼上微信聊天內容..."
                    class="w-full rounded-2xl p-4
                    bg-white/60 outline-none"
                ></textarea>

                <div class="mt-5 flex flex-col md:flex-row gap-3">

                    <select class="rounded-2xl px-4 py-3
                    bg-white/60 outline-none">

                        <option>
                            客戶訊息
                        </option>

                        <option>
                            工程訊息
                        </option>

                    </select>

                    <button class="soft-btn flex-1
                    rounded-2xl py-3
                    bg-gradient-to-r
                    from-indigo-500 to-blue-500
                    text-white font-semibold">

                        AI 解析並儲存

                    </button>

                </div>

            </div>

            <!-- RESULT -->
            <div class="glass rounded-3xl p-6">

                <div class="flex items-center gap-2 mb-5">

                    <i class="fa-solid fa-database text-indigo-500"></i>

                    <h2 class="font-semibold">
                        最近訊息
                    </h2>

                </div>

                <!-- CARD -->
                <div class="message-card
                bg-white/65 rounded-3xl p-5 mb-4">

                    <div class="flex items-center gap-2 mb-3">

                        <span class="px-3 py-1 rounded-full
                        bg-blue-100 text-blue-700 text-xs">

                            客戶

                        </span>

                        <span class="font-semibold">
                            DG6ZM
                        </span>

                    </div>

                    <div class="text-slate-700 leading-relaxed">

                        客戶詢問 DG6ZM 500pcs 是否可於下週交貨，
                        並希望價格調整至 31 RMB。

                    </div>

                    <div class="mt-4 grid grid-cols-3 gap-3">

                        <div class="bg-white rounded-2xl p-3">

                            <div class="text-xs text-slate-400">
                                數量
                            </div>

                            <div class="font-semibold mt-1">
                                500pcs
                            </div>

                        </div>

                        <div class="bg-white rounded-2xl p-3">

                            <div class="text-xs text-slate-400">
                                價格
                            </div>

                            <div class="font-semibold mt-1">
                                31 RMB
                            </div>

                        </div>

                        <div class="bg-white rounded-2xl p-3">

                            <div class="text-xs text-slate-400">
                                交期
                            </div>

                            <div class="font-semibold mt-1">
                                下週
                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
